version: 2

builds:
  - id: px
    main: ./cmd/px
    binary: px
    ldflags:
      - -s -w
      - -X github.com/tzone85/px-dispatch/internal/cli.version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "px_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: tzone85
    name: px-dispatch
