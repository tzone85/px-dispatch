<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">
  <title>Project X — Component Architecture</title>
  <desc>Layered component diagram for the px orchestrator: CLI, planner, dispatcher, pipeline, runtime, state, web/TUI.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box     { fill:#0f172a; stroke:#334155; stroke-width:1.5; rx:8; ry:8; }
      .layer   { fill:#1e293b; stroke:#475569; stroke-width:1.5; rx:10; ry:10; opacity:0.6; }
      .label   { fill:#e2e8f0; font-weight:600; }
      .sub     { fill:#94a3b8; font-size:11px; }
      .arrow   { stroke:#475569; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
      .title   { fill:#f1f5f9; font-size:20px; font-weight:700; }
      .tag     { fill:#22c55e; font-size:10px; font-weight:600; }
      .api     { fill:#38bdf8; font-size:11px; }
    </style>
  </defs>

  <rect width="1100" height="720" fill="#020617"/>
  <text x="40" y="36" class="title">Project X — Component Architecture</text>
  <text x="40" y="56" class="sub">Layered Go packages. Arrows show in-process calls. No circular deps; interfaces at every boundary.</text>

  <!-- CLI Layer -->
  <rect x="40" y="80" width="1020" height="84" class="layer"/>
  <text x="56" y="102" class="label">cmd/px → internal/cli (Cobra)</text>
  <g transform="translate(56,116)">
    <rect class="box" width="120" height="36"/><text x="60" y="22" text-anchor="middle" class="label">plan</text>
    <rect class="box" x="130" width="120" height="36"/><text x="190" y="22" text-anchor="middle" class="label">resume</text>
    <rect class="box" x="260" width="120" height="36"/><text x="320" y="22" text-anchor="middle" class="label">dashboard</text>
    <rect class="box" x="390" width="120" height="36"/><text x="450" y="22" text-anchor="middle" class="label">status</text>
    <rect class="box" x="520" width="120" height="36"/><text x="580" y="22" text-anchor="middle" class="label">events</text>
    <rect class="box" x="650" width="120" height="36"/><text x="710" y="22" text-anchor="middle" class="label">cost</text>
    <rect class="box" x="780" width="120" height="36"/><text x="840" y="22" text-anchor="middle" class="label">agents</text>
    <rect class="box" x="910" width="90" height="36"/><text x="955" y="22" text-anchor="middle" class="label">gc/migrate</text>
  </g>

  <!-- Orchestration -->
  <rect x="40" y="190" width="660" height="180" class="layer"/>
  <text x="56" y="212" class="label">Orchestration</text>

  <rect x="56" y="222" width="180" height="56" class="box"/>
  <text x="146" y="244" text-anchor="middle" class="label">planner</text>
  <text x="146" y="262" text-anchor="middle" class="sub">two-pass decompose</text>

  <rect x="246" y="222" width="180" height="56" class="box"/>
  <text x="336" y="244" text-anchor="middle" class="label">monitor / dispatcher</text>
  <text x="336" y="262" text-anchor="middle" class="sub">wave grouping + spawn</text>

  <rect x="436" y="222" width="248" height="56" class="box"/>
  <text x="560" y="244" text-anchor="middle" class="label">pipeline (7 stages)</text>
  <text x="560" y="262" text-anchor="middle" class="sub">autocommit→diff→review→qa→rebase→merge→cleanup</text>

  <rect x="56" y="296" width="180" height="56" class="box"/>
  <text x="146" y="318" text-anchor="middle" class="label">runtime + router</text>
  <text x="146" y="336" text-anchor="middle" class="sub">claude / codex / gemini</text>

  <rect x="246" y="296" width="180" height="56" class="box"/>
  <text x="336" y="318" text-anchor="middle" class="label">cost ledger + breaker</text>
  <text x="336" y="336" text-anchor="middle" class="sub">per-story / req / day</text>

  <rect x="436" y="296" width="248" height="56" class="box"/>
  <text x="560" y="318" text-anchor="middle" class="label">tmux / watchdog</text>
  <text x="560" y="336" text-anchor="middle" class="sub">session health + recovery</text>

  <!-- LLM + Git -->
  <rect x="720" y="190" width="340" height="180" class="layer"/>
  <text x="736" y="212" class="label">External I/O</text>

  <rect x="736" y="222" width="148" height="56" class="box"/>
  <text x="810" y="244" text-anchor="middle" class="label">llm client</text>
  <text x="810" y="262" text-anchor="middle" class="sub">Claude CLI / API</text>

  <rect x="900" y="222" width="148" height="56" class="box"/>
  <text x="974" y="244" text-anchor="middle" class="label">git / gh</text>
  <text x="974" y="262" text-anchor="middle" class="sub">worktree + PR</text>

  <rect x="736" y="296" width="148" height="56" class="box"/>
  <text x="810" y="318" text-anchor="middle" class="label">modelswitch</text>
  <text x="810" y="336" text-anchor="middle" class="sub">handoff artifacts</text>

  <rect x="900" y="296" width="148" height="56" class="box"/>
  <text x="974" y="318" text-anchor="middle" class="label">logging</text>
  <text x="974" y="336" text-anchor="middle" class="sub">slog json + rotation</text>

  <!-- State -->
  <rect x="40" y="396" width="1020" height="120" class="layer"/>
  <text x="56" y="418" class="label">State (event-sourced)</text>

  <rect x="56" y="428" width="240" height="76" class="box"/>
  <text x="176" y="452" text-anchor="middle" class="label">FileStore</text>
  <text x="176" y="470" text-anchor="middle" class="sub">events.jsonl (append-only)</text>
  <text x="176" y="488" text-anchor="middle" class="sub">28 event types</text>

  <text x="312" y="468" class="tag">project</text>

  <rect x="376" y="428" width="240" height="76" class="box"/>
  <text x="496" y="452" text-anchor="middle" class="label">Projector</text>
  <text x="496" y="470" text-anchor="middle" class="sub">async channel (buffered)</text>

  <text x="632" y="468" class="tag">write</text>

  <rect x="696" y="428" width="320" height="76" class="box"/>
  <text x="856" y="452" text-anchor="middle" class="label">SQLiteStore (projections)</text>
  <text x="856" y="470" text-anchor="middle" class="sub">requirements · stories · agents · escalations</text>
  <text x="856" y="488" text-anchor="middle" class="sub">token_usage · pipeline_runs · session_health</text>

  <!-- Read side / Dashboards -->
  <rect x="40" y="540" width="1020" height="148" class="layer"/>
  <text x="56" y="562" class="label">Read side (queryable views)</text>

  <rect x="56" y="572" width="320" height="100" class="box"/>
  <text x="216" y="596" text-anchor="middle" class="label">internal/web (REST + SSE)</text>
  <text x="216" y="616" text-anchor="middle" class="api">GET /api/about · /api/requirements</text>
  <text x="216" y="632" text-anchor="middle" class="api">GET /api/stories · /api/agents</text>
  <text x="216" y="648" text-anchor="middle" class="api">GET /api/events · /api/escalations</text>
  <text x="216" y="664" text-anchor="middle" class="api">GET /api/cost · /api/health · /api/stream (SSE)</text>

  <rect x="396" y="572" width="280" height="100" class="box"/>
  <text x="536" y="596" text-anchor="middle" class="label">web/ SPA (Alpine + Tailwind)</text>
  <text x="536" y="616" text-anchor="middle" class="sub">embedded via go:embed</text>
  <text x="536" y="640" text-anchor="middle" class="sub">7 tabs · auto-reconnect SSE</text>
  <text x="536" y="660" text-anchor="middle" class="sub">localhost:7890</text>

  <rect x="696" y="572" width="320" height="100" class="box"/>
  <text x="856" y="596" text-anchor="middle" class="label">internal/dashboard (TUI)</text>
  <text x="856" y="616" text-anchor="middle" class="sub">Bubbletea · 6 scrollable panels</text>
  <text x="856" y="640" text-anchor="middle" class="sub">pipeline · agents · activity</text>
  <text x="856" y="660" text-anchor="middle" class="sub">escalations · cost · logs</text>

  <!-- Arrows -->
  <path class="arrow" d="M120,156 L146,222"/>
  <path class="arrow" d="M250,156 L336,222"/>
  <path class="arrow" d="M336,156 L560,222"/>
  <path class="arrow" d="M336,280 L336,296"/>
  <path class="arrow" d="M560,280 L560,296"/>
  <path class="arrow" d="M380,156 L850,572"/>
  <path class="arrow" d="M450,156 L460,640"/>

  <path class="arrow" d="M336,352 L176,428"/>
  <path class="arrow" d="M560,352 L496,428"/>
  <path class="arrow" d="M146,352 L810,222"/>
  <path class="arrow" d="M336,352 L974,222"/>

  <path class="arrow" d="M296,468 L376,468"/>
  <path class="arrow" d="M616,468 L696,468"/>

  <path class="arrow" d="M856,504 L216,572"/>
  <path class="arrow" d="M856,504 L856,572"/>
</svg>
